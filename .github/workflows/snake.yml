name: Generate Snake

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#2A8BF2&color_dots=#E8EEF4,#9FC7F0,#4DA3FF,#2A8BF2,#0A66C2
            dist/github-contribution-grid-snake-dark.svg?color_snake=#4DA3FF&color_dots=#0E1A2B,#173A5E,#2A6FB0,#4DA3FF,#7CC0FF

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

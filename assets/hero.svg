  <text x="62" y="144" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="52" font-weight="600" fill="#F2F7FC">Alexey Serdtse</text>
  <text x="64" y="184" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="19" fill="#C7D8E8">I build reliable data platforms that turn raw events into clear decisions.</text>

    <circle cx="792" cy="125" r="8" fill="#1B3E63" stroke="#9FD0FF" stroke-width="2.5"/>
    <circle cx="856" cy="88"  r="8" fill="#1B3E63" stroke="#BFE0FF" stroke-width="2.5"/>
    <circle cx="856" cy="162" r="8" fill="#1B3E63" stroke="#BFE0FF" stroke-width="2.5"/>
    <circle cx="920" cy="125" r="8" fill="#8FD0FF" stroke="#DCEEFF" stroke-width="2.5"/>

      <stop offset="0" stop-color="#2E6498"/>
      <stop offset="1" stop-color="#1B3E63"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8FD0FF"/>
      <stop offset="1" stop-color="#5FA8E8"/>

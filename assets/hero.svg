<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="250" viewBox="0 0 1000 250" role="img" aria-label="Alexey Serdtse — Data Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E1A2B"/>
      <stop offset="1" stop-color="#0A1018"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2A8BF2"/>
      <stop offset="1" stop-color="#0A66C2"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="250" rx="16" fill="url(#bg)"/>
  <rect width="7" height="250" fill="url(#accent)"/>

  <!-- pipeline motif -->
  <g opacity="0.85">
    <line x1="792" y1="125" x2="858" y2="85"  stroke="#214A77" stroke-width="2"/>
    <line x1="792" y1="125" x2="858" y2="165" stroke="#214A77" stroke-width="2"/>
    <line x1="858" y1="85"  x2="924" y2="125" stroke="#214A77" stroke-width="2"/>
    <line x1="858" y1="165" x2="924" y2="125" stroke="#214A77" stroke-width="2"/>
    <circle cx="792" cy="125" r="9" fill="#0E1A2B" stroke="#2A8BF2" stroke-width="2.5"/>
    <circle cx="858" cy="85"  r="9" fill="#0E1A2B" stroke="#4DA3FF" stroke-width="2.5"/>
    <circle cx="858" cy="165" r="9" fill="#0E1A2B" stroke="#4DA3FF" stroke-width="2.5"/>
    <circle cx="924" cy="125" r="9" fill="#2A8BF2" stroke="#7CC0FF" stroke-width="2.5"/>
  </g>

  <text x="64" y="86" font-family="SFMono-Regular, ui-monospace, Consolas, monospace" font-size="15" letter-spacing="3" fill="#4DA3FF">// DATA ENGINEER</text>
  <text x="62" y="148" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="54" font-weight="700" fill="#F4F8FC">Alexey Serdtse</text>
  <text x="64" y="188" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="19" fill="#9FB3C8">I build reliable data platforms that turn raw events into decisions.</text>
  <text x="64" y="222" font-family="SFMono-Regular, ui-monospace, Consolas, monospace" font-size="13" letter-spacing="1.5" fill="#5B7186">python · sql · snowflake · databricks · airflow · dbt · aws</text>
</svg>
